<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crout Holdings — Business Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Lock each page to exact credit card dimensions */
    @page {
      size: 85.6mm 53.98mm;
      margin: 0;
    }

    html,
    body {
      width: 85.6mm;
      background: white;
      font-family: 'Inter', sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Each card = one printed page */
    .card {
      width: 85.6mm;
      height: 53.98mm;
      position: relative;
      overflow: hidden;
      background: #0d0d0b;
      /* Standard ISO 7810 credit card corner radius = 3.18mm */
      border-radius: 3.18mm;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Page break between front and back */
    .card+.card {
      page-break-before: always;
      break-before: page;
      margin-top: 6mm;
      /* screen spacing only */
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 150px 150px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 0.4px solid rgba(197, 163, 95, 0.25);
      pointer-events: none;
      z-index: 10;
    }

    /* ── FRONT ── */
    .card--front {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: 1fr auto auto;
      padding: 6mm 6mm 5mm 6mm;
    }

    .card--front .accent {
      position: absolute;
      top: -20mm;
      left: -10mm;
      width: 40mm;
      height: 40mm;
      background: radial-gradient(ellipse at top left, rgba(197, 163, 95, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .front__brand {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 2.5mm;
      z-index: 2;
    }

    .front__logo {
      width: 16mm;
      height: 16mm;
      object-fit: contain;
    }

    .front__company {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 6.5pt;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(245, 242, 235, 0.85);
      line-height: 1.3;
      max-width: 38mm;
    }

    .front__qr {
      grid-column: 2;
      grid-row: 1;
      align-self: start;
      justify-self: end;
      z-index: 2;
      width: 22mm;
      height: 22mm;
      border: 0.3mm solid rgba(197, 163, 95, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5mm;
      position: relative;
      background: rgba(255, 255, 255, 0.02);
    }

    .front__qr-img {
      width: 18mm;
      height: 18mm;
      object-fit: contain;
      display: block;
    }

    .front__qr-label {
      font-size: 4pt;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(197, 163, 95, 0.5);
    }

    .front__qr::before,
    .front__qr::after {
      content: '';
      position: absolute;
      width: 2mm;
      height: 2mm;
      border-color: rgba(197, 163, 95, 0.6);
      border-style: solid;
    }

    .front__qr::before {
      top: -0.3mm;
      left: -0.3mm;
      border-width: 0.5mm 0 0 0.5mm;
    }

    .front__qr::after {
      bottom: -0.3mm;
      right: -0.3mm;
      border-width: 0 0.5mm 0.5mm 0;
    }

    .front__divider {
      grid-column: 1 / -1;
      grid-row: 2;
      height: 1px;
      background: linear-gradient(90deg, rgba(197, 163, 95, 0.9) 0%, rgba(197, 163, 95, 0.4) 60%, transparent 100%);
      margin-bottom: 3mm;
      align-self: end;
      z-index: 2;
    }

    .front__contact {
      grid-column: 1 / -1;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      gap: 1.2mm;
      z-index: 2;
    }

    .front__contact-item {
      display: flex;
      align-items: center;
      gap: 1.8mm;
      text-decoration: none;
    }

    .front__contact-icon {
      width: 3.5mm;
      height: 3.5mm;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .front__contact-text {
      font-size: 6pt;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(245, 242, 235, 0.65);
    }

    /* ── BACK ── */
    .card--back {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10mm;
    }

    .back__watermark {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-65%, -50%);
      width: 38mm;
      height: 38mm;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
    }

    .back__nfc {
      position: relative;
      z-index: 2;
      width: 24mm;
      height: 24mm;
      flex-shrink: 0;
    }

    .back__nfc svg {
      width: 100%;
      height: 100%;
    }

    /* Screen-only labels */
    .page-label {
      font-family: 'Inter', sans-serif;
      font-size: 9pt;
      color: #999;
      text-align: center;
      padding: 3mm 0 2mm;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @media print {
      .page-label {
        display: none;
      }

      .card+.card {
        margin-top: 0;
      }
    }
  </style>
</head>

<body>

  <p class="page-label">Front — Page 1</p>

  <!-- FRONT -->
  <div class="card card--front">
    <div class="accent"></div>
    <div class="front__brand">
      <img class="front__logo" src="crout_crest_final.png" alt="Crout Holdings crest" width="38" height="38"
        loading="eager" />
      <span class="front__company">Crout Holdings<br>PTY Ltd</span>
    </div>
    <div class="front__qr" role="img" aria-label="QR code">
      <img class="front__qr-img" src="qr-code.png" alt="QR code" loading="eager" />
      <span class="front__qr-label">Scan</span>
    </div>
    <div class="front__divider"></div>
    <div class="front__contact">
      <a class="front__contact-item" href="mailto:info@crout-holdings.com">
        <svg class="front__contact-icon" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="#c5a35f" stroke-width="1.2" />
          <path d="M1 4.5L8 9.5L15 4.5" stroke="#c5a35f" stroke-width="1.2" />
        </svg>
        <span class="front__contact-text">info@crout-holdings.com</span>
      </a>
      <a class="front__contact-item" href="https://www.crout-holdings.com" target="_blank" rel="noopener noreferrer">
        <svg class="front__contact-icon" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6.5" stroke="#c5a35f" stroke-width="1.2" />
          <ellipse cx="8" cy="8" rx="2.8" ry="6.5" stroke="#c5a35f" stroke-width="1.2" />
          <line x1="1.5" y1="8" x2="14.5" y2="8" stroke="#c5a35f" stroke-width="1.2" />
        </svg>
        <span class="front__contact-text">www.crout-holdings.com</span>
      </a>
      <a class="front__contact-item" href="tel:+27646569894">
        <svg class="front__contact-icon" viewBox="0 0 16 16" fill="none">
          <path
            d="M3 2h3l1.5 3.5-1.75 1.25a8 8 0 003.5 3.5L10.5 8.5 14 10v3a1 1 0 01-1 1C5.163 14 2 7.163 2 3a1 1 0 011-1z"
            stroke="#c5a35f" stroke-width="1.2" stroke-linejoin="round" />
        </svg>
        <span class="front__contact-text">064 656 9894</span>
      </a>
    </div>
  </div>

  <p class="page-label">Back — Page 2</p>
  <span style="height: 1px !important; width: 100%; display: block;"></span>
  <!-- BACK -->
  <div class="card card--back">
    <img class="back__watermark" src="crout_crest_final.png" alt="" width="106" height="106" loading="eager"
      aria-hidden="true" />
    <div class="back__nfc" role="img" aria-label="NFC indicator">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="47" stroke="rgba(197,163,95,0.12)" stroke-width="1" />
        <circle cx="50" cy="50" r="40" stroke="rgba(197,163,95,0.2)" stroke-width="0.8" />
        <circle cx="50" cy="50" r="33" stroke="#c5a35f" stroke-width="1.2" opacity="0.7" />
        <circle cx="50" cy="50" r="26" stroke="rgba(197,163,95,0.5)" stroke-width="0.6" stroke-dasharray="3 2" />
        <circle cx="50" cy="50" r="19" stroke="#c5a35f" stroke-width="1" opacity="0.6" />
        <circle cx="50" cy="50" r="10" fill="rgba(197,163,95,0.15)" stroke="#c5a35f" stroke-width="0.8" opacity="0.8" />
        <path d="M38 43 Q32 50 38 57" stroke="#c5a35f" stroke-width="1.2" stroke-linecap="round" opacity="0.5" />
        <path d="M35 40 Q26 50 35 60" stroke="#c5a35f" stroke-width="0.8" stroke-linecap="round" opacity="0.3" />
        <path d="M62 43 Q68 50 62 57" stroke="#c5a35f" stroke-width="1.2" stroke-linecap="round" opacity="0.5" />
        <path d="M65 40 Q74 50 65 60" stroke="#c5a35f" stroke-width="0.8" stroke-linecap="round" opacity="0.3" />
        <circle cx="50" cy="50" r="3" fill="#c5a35f" opacity="0.9" />
      </svg>
    </div>
  </div>

</body>

</html>
