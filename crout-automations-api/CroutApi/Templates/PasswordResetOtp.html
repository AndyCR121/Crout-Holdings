<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Password reset code</title>
</head>
<body style="margin:0;padding:24px;background:#f5f7fb;font-family:Arial,sans-serif;color:#12233e;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:560px;background:#ffffff;border-radius:16px;padding:32px;border:1px solid #d9e2f1;">
          <tr>
            <td>
              <p style="margin:0 0 12px;font-size:16px;">Hi {{displayName}},</p>
              <p style="margin:0 0 18px;font-size:15px;line-height:1.6;">Use the code below to reset your Crout Automations password. This code expires in 10 minutes.</p>
              <div style="margin:0 0 20px;padding:18px 20px;background:#12233e;border-radius:12px;color:#ffffff;font-size:32px;font-weight:700;letter-spacing:8px;text-align:center;">
                {{otp}}
              </div>
              <p style="margin:0 0 12px;font-size:14px;line-height:1.6;">If you did not request a password reset, you can ignore this email.</p>
              <p style="margin:0;font-size:14px;line-height:1.6;">Crout Automations</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
