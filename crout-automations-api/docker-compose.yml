services:

  # ── MySQL ────────────────────────────────────────────────
  db:
    image: mysql:8.3
    container_name: crout_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      crout_automations
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── REST API ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: CroutApi/Dockerfile
    image: crout-api:base
    container_name: crout_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS:        http://+:8080
      DB_HOST:                db
      DB_PORT:                '3306'
      DB_NAME:                crout_automations
      DB_USER:                ${DB_USER}
      DB_PASSWORD:            ${DB_PASSWORD}
      # Schema comparison target — production database
      PROD_DB_HOST:     ${PROD_DB_HOST}
      PROD_DB_PORT:     ${PROD_DB_PORT}
      PROD_DB_NAME:     ${PROD_DB_NAME}
      PROD_DB_USER:     ${PROD_DB_USER}
      PROD_DB_PASSWORD: ${PROD_DB_PASSWORD}
      
      JWT_SECRET:             ${JWT_SECRET}
      JWT_ISSUER:             ${JWT_ISSUER}
      JWT_AUDIENCE:           ${JWT_AUDIENCE}
      JWT_EXPIRY_HOURS:       ${JWT_EXPIRY_HOURS}
      HMAC_SECRET:            ${HMAC_SECRET}
      PAYSTACK_SECRET_KEY:    ${PAYSTACK_SECRET_KEY}
      ALLOWED_ORIGINS:        ${ALLOWED_ORIGINS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_ENABLE_SSL: ${SMTP_ENABLE_SSL}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
    ports:
      - '5000:8080'   # exposed to host only — host Nginx proxies this

volumes:
  db_data:
