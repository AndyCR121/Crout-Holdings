services:

  # ── MySQL ────────────────────────────────────────────────
  db:
    image: mysql:8.3
    container_name: crout_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      crout_automations
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── REST API ──────────────────────────────────────────────
  api:
    build:
      context: ./CroutApi
      dockerfile: Dockerfile
    container_name: crout_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS:        http://+:8080
      DB_HOST:                db
      DB_PORT:                '3306'
      DB_NAME:                crout_automations
      DB_USER:                ${DB_USER}
      DB_PASSWORD:            ${DB_PASSWORD}
      JWT_SECRET:             ${JWT_SECRET}
      JWT_ISSUER:             ${JWT_ISSUER}
      JWT_AUDIENCE:           ${JWT_AUDIENCE}
      JWT_EXPIRY_HOURS:       '8'
      HMAC_SECRET:            ${HMAC_SECRET}
    expose:
      - '8080'

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: crout_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

  # ── Certbot (SSL) ───────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: crout_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renew automatically — runs then exits, nginx picks up renewed certs
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

volumes:
  db_data:
  certbot_www:
  certbot_conf:
