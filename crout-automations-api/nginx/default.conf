# HTTP — redirect all traffic to HTTPS
server {
    listen 80;
    server_name api.automations.crout-holdings.com;

    # Certbot ACME challenge (needed for SSL cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to .NET API
server {
    listen 443 ssl;
    server_name api.automations.crout-holdings.com;

    ssl_certificate     /etc/letsencrypt/live/api.automations.crout-holdings.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.automations.crout-holdings.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /api/ {
        # ── CORS preflight ────────────────────────────────────────────────────
        # Handle OPTIONS before proxying so the browser receives CORS headers.
        # Without this, nginx absorbs the preflight and never forwards it to
        # ASP.NET, so Access-Control-Allow-Origin is never returned.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      $http_origin  always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           '86400' always;
            add_header 'Content-Length' '0';
            add_header 'Content-Type'   'text/plain charset=UTF-8';
            return 204;
        }

        # ── Proxy to ASP.NET ─────────────────────────────────────────────────
        # ASP.NET sets Access-Control-Allow-Origin on real requests via its
        # own CORS middleware (ALLOWED_ORIGINS env var). We must not add a
        # duplicate header here or the browser will reject the response.
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
