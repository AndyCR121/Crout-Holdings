<div class="release-form">
  <div class="release-form__header">
    <h2>{{ title }}</h2>
    <button class="btn-cancel" type="button" mat-dialog-close>Cancel</button>
  </div>

  <form [formGroup]="form" class="release-form__body">
    <label>
      Release Version <span class="required">*</span>
      <input class="admin-input" formControlName="releaseVersion" placeholder="1.0.10" />
    </label>
    <p *ngIf="form.controls.releaseVersion.touched && form.controls.releaseVersion.hasError('required')" class="release-form__error">Version required.</p>
    <p *ngIf="form.controls.releaseVersion.touched && form.controls.releaseVersion.hasError('pattern')" class="release-form__error">Version must match x.y.z.</p>

    <label>
      Release Date <span class="required">*</span>
      <input class="admin-input" type="date" formControlName="releaseDate" />
    </label>
    <p *ngIf="form.controls.releaseDate.touched && form.controls.releaseDate.hasError('required')" class="release-form__error">Release date required.</p>

    <label>
      Release Notes HTML <span class="required">*</span>
      <textarea class="admin-input release-form__notes" rows="12" formControlName="releaseNotes"></textarea>
    </label>
    <p *ngIf="form.controls.releaseNotes.touched && form.controls.releaseNotes.hasError('required')" class="release-form__error">Release notes required.</p>

    <p *ngIf="duplicateError" class="release-form__error">{{ duplicateError }}</p>
    <p *ngIf="notFoundError" class="release-form__error">{{ notFoundError }}</p>
  </form>

  <div class="admin-modal-actions release-form__actions">
    <button class="btn-save" type="button" [disabled]="isSaving" (click)="submit()">
      {{ isSaving ? (data.mode === 'create' ? 'Creating...' : 'Saving...') : (data.mode === 'create' ? 'Create' : 'Save') }}
    </button>
    <button class="btn-cancel" type="button" mat-dialog-close>Cancel</button>
  </div>
</div>
