<div class="admin-layout">
  <ca-admin-sidebar />
  <main class="admin-main">
    <div class="release-admin">
      <div class="release-admin__header">
        <div>
          <h1>Release Notes</h1>
          <p>Manage the public changelog shown from the footer version button.</p>
        </div>
        <button mat-flat-button color="primary" type="button" (click)="openCreate()">Create release note</button>
      </div>

      <div *ngIf="error()" class="release-admin__error">{{ error() }}</div>

      <div *ngIf="loading()" class="release-admin__loading">
        <mat-progress-spinner diameter="44" mode="indeterminate"></mat-progress-spinner>
      </div>

      <div *ngIf="!loading()" class="release-admin__table-wrap">
        <table mat-table [dataSource]="items()" matSort (matSortChange)="onSortChange($event)" class="release-admin__table">
          <ng-container matColumnDef="releaseVersion">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="releaseVersion">Version</th>
            <td mat-cell *matCellDef="let item"><strong>v{{ item.releaseVersion }}</strong></td>
          </ng-container>

          <ng-container matColumnDef="releaseDate">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="releaseDate">Release Date</th>
            <td mat-cell *matCellDef="let item">{{ item.releaseDate }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let item" class="release-admin__actions">
              <button mat-icon-button type="button" aria-label="Edit release note" (click)="openEdit(item)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button type="button" aria-label="Delete release note" (click)="deleteReleaseNote(item)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          <tr class="mat-row" *ngIf="items().length === 0">
            <td class="mat-cell release-admin__empty" [attr.colspan]="displayedColumns.length">No release notes found.</td>
          </tr>
        </table>

        <mat-paginator
          [length]="total()"
          [pageIndex]="pageIndex()"
          [pageSize]="pageSize()"
          [pageSizeOptions]="[10]"
          (page)="onPage($event)">
        </mat-paginator>
      </div>
    </div>

    <ca-confirm-dialog />
  </main>
</div>
