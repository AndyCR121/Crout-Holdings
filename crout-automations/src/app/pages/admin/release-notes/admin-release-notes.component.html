<div class="admin-page release-admin">
  <div class="admin-page-header release-admin__header">
    <div>
      <h1 class="admin-page-title">Release Notes</h1>
      <p class="release-admin__intro">Manage the public changelog shown from the footer version button.</p>
    </div>
    <button class="btn-create" type="button" (click)="openCreate()">+ New Release Note</button>
  </div>

  <div *ngIf="error()" class="admin-error">{{ error() }}</div>

  <div *ngIf="loading()" class="admin-loading">
    <div class="skeleton-row" *ngFor="let i of [1,2,3,4,5]"></div>
  </div>

  <div *ngIf="!loading()" class="admin-table-wrap">
    <table class="admin-table release-admin__table">
      <thead>
        <tr>
          <th>
            <button class="release-admin__sort" type="button" (click)="toggleSort('releaseVersion')">
              Version
              <span>{{ sortIndicator('releaseVersion') }}</span>
            </button>
          </th>
          <th>
            <button class="release-admin__sort" type="button" (click)="toggleSort('releaseDate')">
              Release Date
              <span>{{ sortIndicator('releaseDate') }}</span>
            </button>
          </th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items()">
          <td><strong>v{{ item.releaseVersion }}</strong></td>
          <td>{{ item.releaseDate }}</td>
          <td class="admin-actions">
            <button class="btn-edit" type="button" (click)="openEdit(item)">Edit</button>
            <button class="btn-delete" type="button" (click)="deleteReleaseNote(item)">Delete</button>
          </td>
        </tr>
        <tr *ngIf="items().length === 0">
          <td colspan="3" class="admin-empty">No release notes found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading()" class="admin-pagination">
    <button class="btn-page" [disabled]="pageIndex() === 0" (click)="prevPage()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Prev
    </button>
    <span>Page {{ pageIndex() + 1 }} of {{ totalPages() }}</span>
    <button class="btn-page" [disabled]="!hasMore()" (click)="nextPage()">
      Next
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>
