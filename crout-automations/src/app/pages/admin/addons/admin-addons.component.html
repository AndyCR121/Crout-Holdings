<div class="portal-page-layout">
  <ca-admin-left-menu />
  <main class="portal-page-main admin-addons">
    <ng-container *ngIf="loading(); else content"><div class="admin-loading">Loading addons…</div></ng-container>
    <ng-template #content>
      <div class="admin-page-header">
        <h1>Addons</h1>
        <button class="btn btn-primary" (click)="openCreate()">+ Add Addon</button>
      </div>
      <div class="admin-error" *ngIf="error()">{{ error() }}</div>
      <div class="admin-create-form" *ngIf="showCreate()">
        <h3>New Addon</h3>
        <div class="form-grid">
          <label>Name<input [(ngModel)]="createBuffer().addonName" placeholder="Addon name" /></label>
          <label>Description<input [(ngModel)]="createBuffer().description" placeholder="Description" /></label>
          <label>Price<input [(ngModel)]="createBuffer().price" type="number" /></label>
          <label class="checkbox-label"><input type="checkbox" [(ngModel)]="createBuffer().active" /> Active</label>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" (click)="submitCreate()" [disabled]="saving()">Save</button>
          <button class="btn btn-ghost" (click)="showCreate.set(false)">Cancel</button>
        </div>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Name</th><th>Description</th><th>Price</th><th>Active</th><th>Actions</th></tr></thead>
          <tbody>
            <tr *ngFor="let a of addons()">
              <ng-container *ngIf="!isEditing(a.addonId); else editRow">
                <td>{{ a.addonName }}</td><td>{{ a.description }}</td>
                <td>R{{ a.price | number:'1.2-2' }}</td><td>{{ a.active ? 'Yes' : 'No' }}</td>
                <td class="row-actions">
                  <button class="btn btn-sm btn-ghost" (click)="startEdit(a)">Edit</button>
                  <button class="btn btn-sm btn-danger" (click)="onDelete(a)">Delete</button>
                </td>
              </ng-container>
              <ng-template #editRow>
                <td><input [(ngModel)]="getDraft(a.addonId).addonName" /></td>
                <td><input [(ngModel)]="getDraft(a.addonId).description" /></td>
                <td><input [(ngModel)]="getDraft(a.addonId).price" type="number" /></td>
                <td><input type="checkbox" [(ngModel)]="getDraft(a.addonId).active" /></td>
                <td class="row-actions">
                  <button class="btn btn-sm btn-primary" (click)="saveEdit(a)" [disabled]="saving()">Save</button>
                  <button class="btn btn-sm btn-ghost" (click)="cancelEdit(a.addonId)">Cancel</button>
                </td>
              </ng-template>
            </tr>
          </tbody>
        </table>
      </div>
    </ng-template>
  </main>
</div>
