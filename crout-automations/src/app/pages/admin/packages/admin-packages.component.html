<div class="portal-page-layout">
  <ca-admin-left-menu />
  <main class="portal-page-main admin-packages">
    <ng-container *ngIf="loading(); else content"><div class="admin-loading">Loading packages…</div></ng-container>
    <ng-template #content>
      <div class="admin-page-header">
        <h1>Packages</h1>
        <button class="btn btn-primary" (click)="openCreate()">+ Add Package</button>
      </div>
      <div class="admin-error" *ngIf="error()">{{ error() }}</div>
      <div class="admin-create-form" *ngIf="showCreate()">
        <h3>New Package</h3>
        <div class="form-grid">
          <label>Name<input [(ngModel)]="createBuffer().packageName" placeholder="Package name" /></label>
          <label>Description<input [(ngModel)]="createBuffer().description" placeholder="Description" /></label>
          <label>Price<input [(ngModel)]="createBuffer().price" type="number" /></label>
          <label class="checkbox-label"><input type="checkbox" [(ngModel)]="createBuffer().active" /> Active</label>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" (click)="submitCreate()" [disabled]="saving()">Save</button>
          <button class="btn btn-ghost" (click)="showCreate.set(false)">Cancel</button>
        </div>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Name</th><th>Description</th><th>Price</th><th>Active</th><th>Actions</th></tr></thead>
          <tbody>
            <tr *ngFor="let p of packages()">
              <ng-container *ngIf="!isEditing(p.packageId); else editRow">
                <td>{{ p.packageName }}</td><td>{{ p.description }}</td>
                <td>R{{ p.price | number:'1.2-2' }}</td><td>{{ p.active ? 'Yes' : 'No' }}</td>
                <td class="row-actions">
                  <button class="btn btn-sm btn-ghost" (click)="startEdit(p)">Edit</button>
                  <button class="btn btn-sm btn-danger" (click)="onDelete(p)">Delete</button>
                </td>
              </ng-container>
              <ng-template #editRow>
                <td><input [(ngModel)]="getDraft(p.packageId).packageName" /></td>
                <td><input [(ngModel)]="getDraft(p.packageId).description" /></td>
                <td><input [(ngModel)]="getDraft(p.packageId).price" type="number" /></td>
                <td><input type="checkbox" [(ngModel)]="getDraft(p.packageId).active" /></td>
                <td class="row-actions">
                  <button class="btn btn-sm btn-primary" (click)="saveEdit(p)" [disabled]="saving()">Save</button>
                  <button class="btn btn-sm btn-ghost" (click)="cancelEdit(p.packageId)">Cancel</button>
                </td>
              </ng-template>
            </tr>
          </tbody>
        </table>
      </div>
    </ng-template>
  </main>
</div>
