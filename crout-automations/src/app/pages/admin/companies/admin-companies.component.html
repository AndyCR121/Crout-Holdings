<div class="portal-page-layout">
  <ca-admin-left-menu />
  <main class="portal-page-main admin-companies">
    <ng-container *ngIf="loading(); else content"><div class="admin-loading">Loading companies…</div></ng-container>
    <ng-template #content>
      <div class="admin-page-header">
        <h1>Companies</h1>
        <button class="btn btn-primary" (click)="openCreate()">+ Add Company</button>
      </div>
      <div class="admin-error" *ngIf="error()">{{ error() }}</div>
      <div class="admin-create-form" *ngIf="showCreate()">
        <h3>New Company</h3>
        <div class="form-grid">
          <label>Name<input [(ngModel)]="createBuffer().companyName" placeholder="Company name" /></label>
          <label>Industry<input [(ngModel)]="createBuffer().industry" placeholder="Industry" /></label>
          <label>Email<input [(ngModel)]="createBuffer().email" placeholder="Email" /></label>
          <label>Phone<input [(ngModel)]="createBuffer().phone" placeholder="Phone" /></label>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" (click)="submitCreate()" [disabled]="saving()">Save</button>
          <button class="btn btn-ghost" (click)="showCreate.set(false)">Cancel</button>
        </div>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Name</th><th>Industry</th><th>Email</th><th>Phone</th><th>Actions</th></tr></thead>
          <tbody>
            <tr *ngFor="let c of companies()">
              <ng-container *ngIf="!isEditing(c.companyId); else editRow">
                <td>{{ c.companyName }}</td><td>{{ c.industry ?? '–' }}</td>
                <td>{{ c.email ?? '–' }}</td><td>{{ c.phone ?? '–' }}</td>
                <td class="row-actions">
                  <button class="btn btn-sm btn-ghost" (click)="startEdit(c)">Edit</button>
                  <button class="btn btn-sm btn-danger" (click)="onDelete(c)">Delete</button>
                </td>
              </ng-container>
              <ng-template #editRow>
                <td><input [(ngModel)]="getDraft(c.companyId).companyName" /></td>
                <td><input [(ngModel)]="getDraft(c.companyId).industry" /></td>
                <td><input [(ngModel)]="getDraft(c.companyId).email" /></td>
                <td><input [(ngModel)]="getDraft(c.companyId).phone" /></td>
                <td class="row-actions">
                  <button class="btn btn-sm btn-primary" (click)="saveEdit(c)" [disabled]="saving()">Save</button>
                  <button class="btn btn-sm btn-ghost" (click)="cancelEdit(c.companyId)">Cancel</button>
                </td>
              </ng-template>
            </tr>
          </tbody>
        </table>
      </div>
    </ng-template>
  </main>
</div>
