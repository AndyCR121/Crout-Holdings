<div class="portal-page-layout">
  <ca-admin-left-menu />
  <main class="portal-page-main admin-service-features">
    <ng-container *ngIf="loading(); else content"><div class="admin-loading">Loading features…</div></ng-container>
    <ng-template #content>
      <div class="admin-page-header">
        <h1>Service Features</h1>
        <button class="btn btn-primary" (click)="openCreate()">+ Add Feature</button>
      </div>
      <div class="admin-error" *ngIf="error()">{{ error() }}</div>
      <div class="admin-create-form" *ngIf="showCreate()">
        <h3>New Feature</h3>
        <div class="form-grid">
          <label>Name<input [(ngModel)]="createBuffer().featureName" placeholder="Feature name" /></label>
          <label>Description<input [(ngModel)]="createBuffer().description" placeholder="Description" /></label>
          <label class="checkbox-label"><input type="checkbox" [(ngModel)]="createBuffer().active" /> Active</label>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" (click)="submitCreate()" [disabled]="saving()">Save</button>
          <button class="btn btn-ghost" (click)="showCreate.set(false)">Cancel</button>
        </div>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Name</th><th>Description</th><th>Active</th><th>Actions</th></tr></thead>
          <tbody>
            <tr *ngFor="let f of features()">
              <ng-container *ngIf="!isEditing(f.featureId); else editRow">
                <td>{{ f.featureName }}</td><td>{{ f.description }}</td>
                <td>{{ f.active ? 'Yes' : 'No' }}</td>
                <td class="row-actions">
                  <button class="btn btn-sm btn-ghost" (click)="startEdit(f)">Edit</button>
                  <button class="btn btn-sm btn-danger" (click)="onDelete(f)">Delete</button>
                </td>
              </ng-container>
              <ng-template #editRow>
                <td><input [(ngModel)]="getDraft(f.featureId).featureName" /></td>
                <td><input [(ngModel)]="getDraft(f.featureId).description" /></td>
                <td><input type="checkbox" [(ngModel)]="getDraft(f.featureId).active" /></td>
                <td class="row-actions">
                  <button class="btn btn-sm btn-primary" (click)="saveEdit(f)" [disabled]="saving()">Save</button>
                  <button class="btn btn-sm btn-ghost" (click)="cancelEdit(f.featureId)">Cancel</button>
                </td>
              </ng-template>
            </tr>
          </tbody>
        </table>
      </div>
    </ng-template>
  </main>
</div>
