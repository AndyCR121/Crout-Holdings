<div class="portal-page-layout">
  <ca-admin-left-menu />
  <main class="portal-page-main admin-services">
    <ng-container *ngIf="loading(); else content">
      <div class="admin-loading">Loading services…</div>
    </ng-container>
    <ng-template #content>
      <div class="admin-page-header">
        <h1>Services</h1>
        <button class="btn btn-primary" (click)="openCreate()">+ Add Service</button>
      </div>
      <div class="admin-error" *ngIf="error()">{{ error() }}</div>
      <div class="admin-create-form" *ngIf="showCreate()">
        <h3>New Service</h3>
        <div class="form-grid">
          <label>Name<input [(ngModel)]="createBuffer().serviceName" placeholder="Service name" /></label>
          <label>Description<input [(ngModel)]="createBuffer().description" placeholder="Description" /></label>
          <label>Price<input [(ngModel)]="createBuffer().price" type="number" placeholder="0.00" /></label>
          <label class="checkbox-label"><input type="checkbox" [(ngModel)]="createBuffer().active" /> Active</label>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" (click)="submitCreate()" [disabled]="saving()">Save</button>
          <button class="btn btn-ghost" (click)="showCreate.set(false)">Cancel</button>
        </div>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Name</th><th>Description</th><th>Price</th><th>Active</th><th>Actions</th></tr></thead>
          <tbody>
            <tr *ngFor="let s of services()">
              <ng-container *ngIf="!isEditing(s.serviceId); else editRow">
                <td>{{ s.serviceName }}</td>
                <td>{{ s.description }}</td>
                <td>R{{ s.price | number:'1.2-2' }}</td>
                <td>{{ s.active ? 'Yes' : 'No' }}</td>
                <td class="row-actions">
                  <button class="btn btn-sm btn-ghost" (click)="startEdit(s)">Edit</button>
                  <button class="btn btn-sm btn-danger" (click)="onDelete(s)">Delete</button>
                </td>
              </ng-container>
              <ng-template #editRow>
                <td><input [(ngModel)]="getDraft(s.serviceId).serviceName" /></td>
                <td><input [(ngModel)]="getDraft(s.serviceId).description" /></td>
                <td><input [(ngModel)]="getDraft(s.serviceId).price" type="number" /></td>
                <td><input type="checkbox" [(ngModel)]="getDraft(s.serviceId).active" /></td>
                <td class="row-actions">
                  <button class="btn btn-sm btn-primary" (click)="saveEdit(s)" [disabled]="saving()">Save</button>
                  <button class="btn btn-sm btn-ghost" (click)="cancelEdit(s.serviceId)">Cancel</button>
                </td>
              </ng-template>
            </tr>
          </tbody>
        </table>
      </div>
    </ng-template>
  </main>
</div>
