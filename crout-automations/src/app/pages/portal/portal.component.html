<div class="portal-layout">

  <button
    type="button"
    class="shell-mobile-toggle portal-mobile-toggle"
    (click)="openSidebar()"
    [attr.aria-expanded]="sidebarOpen"
    aria-controls="portal-shell-sidebar"
  >
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
    Menu
  </button>

  <button
    type="button"
    class="shell-sidebar-backdrop"
    [class.is-open]="sidebarOpen"
    (click)="closeSidebar()"
    aria-label="Close portal menu"
  ></button>

  <!-- Sidebar -->
  <aside id="portal-shell-sidebar" class="portal-sidebar" [class.is-open]="sidebarOpen">
    <div class="portal-logo">
      <button type="button" class="shell-sidebar-close" (click)="closeSidebar()" aria-label="Close portal menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <span class="portal-logo-mark">CA</span>
      <span class="portal-logo-name">Client Portal</span>
    </div>

    <nav class="portal-nav" aria-label="Portal navigation">
      <a href="/client/dashboard" hrefActive="active" class="portal-nav-item" (click)="closeSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="/client/services" hrefActive="active" class="portal-nav-item" (click)="closeSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l9 4.5V12c0 5-4 9.3-9 10.5C7 21.3 3 17 3 12V6.5L12 2z"/></svg>
        Services
      </a>
      <a href="/client/profile" hrefActive="active" class="portal-nav-item" (click)="closeSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Profile
      </a>
      <a href="/client/billing" hrefActive="active" class="portal-nav-item" (click)="closeSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
        Billing
      </a>
    </nav>

    <div class="portal-sidebar-footer">
      <div class="portal-user-chip" *ngIf="user()">
        <span class="portal-user-avatar">{{ initials() }}</span>
        <div class="portal-user-info">
          <span class="portal-user-name">{{ user()!.username }}</span>
          <span class="portal-user-company" *ngIf="primaryCompany()">{{ primaryCompany() }}</span>
        </div>
      </div>

      <!-- Admin Panel link — only visible to admin users -->
      <a
        *ngIf="user()?.isAdmin"
        href="/admin"
        class="portal-nav-item portal-nav-item--admin"
        (click)="closeSidebar()"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Admin Panel
      </a>

      <button class="portal-logout-btn" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="portal-main">
    <router-outlet />
  </main>

</div>
