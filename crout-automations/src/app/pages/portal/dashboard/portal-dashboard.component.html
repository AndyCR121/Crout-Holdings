<div class="portal-page-layout">
  <ca-portal-left-menu />
  <main class="portal-page-main">
    <!-- ─────────────────────────────────────────────────────────────────
         Original dashboard content below — unchanged
    ───────────────────────────────────────────────────────────────────── -->
    <ng-container *ngIf="loading(); else dashContent">
      <div class="dash-loading">Loading your dashboard…</div>
    </ng-container>
    <ng-template #dashContent>
      <div class="dash-root">
        <header class="dash-header">
          <h1 class="dash-title">Dashboard</h1>
          <p class="dash-sub">Welcome back, {{ user()?.firstName || user()?.username }}</p>
        </header>
        <section class="dash-services" *ngIf="userServices().length; else noServices">
          <div class="service-card" *ngFor="let us of userServices()">
            <div class="service-card-header">
              <span class="service-name">{{ getService(us.serviceId)?.serviceName ?? 'Service' }}</span>
              <span class="service-status" [ngClass]="statusClass(us.status)">{{ statusLabel(us.status) }}</span>
            </div>
            <p class="service-company" *ngIf="getCompany(us.companyId) as c">{{ c.companyName }}</p>
            <div class="service-addons" *ngIf="getAddonNames(us.addonConfig).length">
              <span class="addon-chip" *ngFor="let a of getAddonNames(us.addonConfig)">{{ a }}</span>
            </div>
            <div class="service-chart" *ngIf="!development">
              <svg width="100%" height="80" viewBox="0 0 560 80" preserveAspectRatio="none">
                <rect *ngFor="let b of chartBars(us.serviceId)"
                  [attr.x]="b.x" [attr.y]="80 - b.h" [attr.width]="b.w" [attr.height]="b.h"
                  [class]="b.isError ? 'bar-error' : 'bar-ok'" />
              </svg>
            </div>
          </div>
        </section>
        <ng-template #noServices>
          <div class="dash-empty">
            <p>No active services yet. <a href="/services">Browse services</a> to get started.</p>
          </div>
        </ng-template>
      </div>
    </ng-template>
  </main>
</div>
