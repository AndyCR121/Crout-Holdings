<div
  *ngIf="dialog.state()"
  class="ca-confirm-backdrop"
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="'confirm-title'"
  (click)="dialog.cancel()"
  (keydown.escape)="dialog.cancel()"
>
  <div class="ca-confirm-modal" (click)="$event.stopPropagation()">

    <div class="ca-confirm-icon" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>

    <h3 id="confirm-title" class="ca-confirm-title">{{ dialog.state()!.title }}</h3>
    <p class="ca-confirm-message">{{ dialog.state()!.message }}</p>

    <div class="ca-confirm-actions">
      <button class="ca-confirm-btn ca-confirm-btn--cancel" (click)="dialog.cancel()">Cancel</button>
      <button class="ca-confirm-btn ca-confirm-btn--danger" (click)="dialog.confirm()">
        {{ dialog.state()!.confirmLabel }}
      </button>
    </div>

  </div>
</div>
