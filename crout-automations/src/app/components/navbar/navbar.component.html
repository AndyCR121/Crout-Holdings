<nav class="ca-navbar">
  <!-- Desktop Links -->
  <ul class="ca-navbar-links" role="list">
    <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a></li>
    <li><a routerLink="/services" routerLinkActive="active" (click)="closeMenu()">Services</a></li>
    <li><a routerLink="/contact-us" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
    <li *ngIf="auth.isLoggedIn()">
      <a routerLink="/client/dashboard" routerLinkActive="active" class="ca-navbar-portal" (click)="closeMenu()">Client Portal</a>
    </li>
  </ul>

  <!-- Hamburger (mobile) -->
  <button class="ca-navbar-hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen" aria-label="Toggle navigation">
    <svg *ngIf="!menuOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6"  x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
    <svg *ngIf="menuOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="4" y1="4" x2="20" y2="20"/>
      <line x1="20" y1="4" x2="4" y2="20"/>
    </svg>
  </button>

  <!-- Mobile Drawer -->
  <div class="ca-navbar-mobile" [class.open]="menuOpen">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a>
    <a routerLink="/services" routerLinkActive="active" (click)="closeMenu()">Services</a>
    <a routerLink="/contact-us" routerLinkActive="active" (click)="closeMenu()">Contact</a>
    <a *ngIf="auth.isLoggedIn()" routerLink="/client/dashboard" routerLinkActive="active" class="ca-navbar-portal" (click)="closeMenu()">Client Portal</a>
  </div>
</nav>
