<!-- Account Button — self-contained, safe for Elementor custom HTML widget -->
<div class="ca-account-btn-wrap">

  <!-- Trigger -->
  <button
    class="ca-account-trigger"
    [class.is-logged-in]="loggedIn()"
    (click)="toggleDropdown()"
    [attr.aria-expanded]="open()"
    aria-haspopup="true"
    aria-label="Account"
  >
    @if (loggedIn() && user()) {
      <!-- Avatar -->
      <span class="ca-avatar">
        @if (user()!.profilePicture) {
          <img [src]="user()!.profilePicture!" [alt]="user()!.Username" />
        } @else {
          <span class="ca-avatar-initials">{{ initials() }}</span>
        }
      </span>
      <!-- Identity -->
      <span class="ca-account-identity">
        <span class="ca-account-username">{{ user()!.Username }}</span>
        @if (user()!.Company) {
          <span class="ca-account-company">{{ user()!.Company }}</span>
        }
      </span>
      <!-- Caret -->
      <svg class="ca-caret" [class.open]="open()" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    } @else {
      <!-- Not logged in -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <span class="ca-account-login-label">Login / Sign Up</span>
    }
  </button>

  <!-- Dropdown (logged in only) -->
  @if (open() && loggedIn()) {
    <div class="ca-account-dropdown" role="menu">
      <button class="ca-dd-item" role="menuitem" (click)="navigate('/client/dashboard')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </button>
      <button class="ca-dd-item" role="menuitem" (click)="navigate('/client/services')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l9 4.5V12c0 5-4 9.3-9 10.5C7 21.3 3 17 3 12V6.5L12 2z"/></svg>
        Services
      </button>
      <button class="ca-dd-item" role="menuitem" (click)="navigate('/client/profile')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Profile
      </button>
      <button class="ca-dd-item" role="menuitem" (click)="navigate('/client/billing')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
        Billing
      </button>
      <div class="ca-dd-divider"></div>
      <button class="ca-dd-item ca-dd-logout" role="menuitem" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  }
</div>

<!-- Auth Modal -->
@if (showAuthModal()) {
  <ca-auth-modal (close)="closeModal()" />
}
