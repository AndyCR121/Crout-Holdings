<aside class="portal-sidebar">
  <div class="portal-logo">
    <span class="portal-logo-mark">CA</span>
    <span class="portal-logo-name">{{ portalLabel() }}</span>
  </div>

  <nav class="portal-nav" aria-label="Portal navigation">
    <a href="/client/dashboard" class="portal-nav-item"
       [class.active]="isActive('/client/dashboard')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3"  y="3"  width="7" height="7" rx="1"/>
        <rect x="14" y="3"  width="7" height="7" rx="1"/>
        <rect x="3"  y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Dashboard
    </a>
    <a href="/client/services" class="portal-nav-item"
       [class.active]="isActive('/client/services')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2l9 4.5V12c0 5-4 9.3-9 10.5C7 21.3 3 17 3 12V6.5L12 2z"/>
      </svg>
      Services
    </a>
    <a href="/client/profile" class="portal-nav-item"
       [class.active]="isActive('/client/profile')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Profile
    </a>
    <a href="/client/billing/subscriptions" class="portal-nav-item"
       [class.active]="isActive('/client/billing')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <path d="M2 10h20"/>
      </svg>
      Billing
    </a>

    <a
      *ngIf="isDev()"
      href="/dev/dashboard"
      class="portal-nav-item portal-nav-item--admin"
      [class.active]="isActive('/dev/dashboard')"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M16 18l6-6-6-6"/>
        <path d="M8 6l-6 6 6 6"/>
      </svg>
      Dev Dashboard
    </a>
    <a
      *ngIf="isDev()"
      href="/dev/services"
      class="portal-nav-item portal-nav-item--admin"
      [class.active]="isActive('/dev/services')"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 7h16"/>
        <path d="M4 12h16"/>
        <path d="M4 17h16"/>
      </svg>
      Dev Services
    </a>
  </nav>

  <div class="portal-sidebar-footer">
    <div class="portal-user-chip" *ngIf="user()">
      <span class="portal-user-avatar">{{ initials() }}</span>
      <div class="portal-user-info">
        <span class="portal-user-name">{{ user()!.username }}</span>
        <span class="portal-user-company" *ngIf="primaryCompany()">{{ primaryCompany() }}</span>
      </div>
    </div>

    <a
      *ngIf="isAdmin()"
      href="/admin/users"
      class="portal-nav-item portal-nav-item--admin"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Admin Panel
    </a>

    <button class="portal-logout-btn" (click)="logout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>
</aside>
