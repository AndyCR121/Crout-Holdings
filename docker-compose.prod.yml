services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public
      - internal

  frontend:
    build:
      context: ./crout-automations
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - public

  api:
    build:
      context: ./crout-automations-api
      dockerfile: CroutApi/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PROD_DB_HOST: ${PROD_DB_HOST}
      PROD_DB_PORT: ${PROD_DB_PORT}
      PROD_DB_NAME: ${PROD_DB_NAME}
      PROD_DB_USER: ${PROD_DB_USER}
      PROD_DB_PASSWORD: ${PROD_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
      HMAC_SECRET: ${HMAC_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_ENABLE_SSL: ${SMTP_ENABLE_SSL}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
    networks:
      - public
      - internal

  db:
    image: mysql:8.3
    container_name: crout-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./crout-automations-api/sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./crout-automations-api/sql/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    networks:
      - internal

networks:
  public:
  internal:
    internal: true

volumes:
  mysql_data:
  caddy_data:
  caddy_config:
